# /etc/nginx/sites-available/lecturelive
# 使用方法: ln -s /etc/nginx/sites-available/lecturelive /etc/nginx/sites-enabled/

upstream lecturelive_web {
    server 127.0.0.1:3000;
}

upstream lecturelive_ws {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name your-domain.com;  # <-- 替换为你的域名

    # 如需 HTTPS，取消注释以下两行并配置证书
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    client_max_body_size 100M;

    # Next.js 应用
    location / {
        proxy_pass http://lecturelive_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 服务
    location /socket.io/ {
        proxy_pass http://lecturelive_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
