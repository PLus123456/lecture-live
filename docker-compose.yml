version: '3.8'
services:
  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"     # WebSocket server for live share
    env_file: .env.local
    environment:
      DATABASE_URL: mysql://lecturelive:${DB_PASSWORD_ENCODED}@db:3306/lecturelive
      # 用 URL 编码后的口令拼 URL（口令含 '/'、'@'、':' 等时裸拼会让 ioredis 的 url 解析报错）；
      # redis 服务自身的 --requirepass / healthcheck 仍用未编码的 REDIS_PASSWORD。
      REDIS_URL: redis://:${REDIS_PASSWORD_ENCODED}@redis:6379
    # 录音/转录/摘要/报告/聊天图片/图标/异步分片等都写入 /app/data（未配 Cloudreve 时仅存本地）；
    # 不挂卷则容器重建即丢失全部用户数据、DB 中 local: 引用全部悬空。
    volumes:
      - appdata:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 45s
    restart: unless-stopped

  db:
    image: mysql:8.4
    command: --mysql-native-password=ON
    environment:
      MYSQL_DATABASE: lecturelive
      MYSQL_USER: lecturelive
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ulecturelive", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cloudreve:
    # 钉死具体版本，避免 latest 在重建时悄悄拉到不兼容的大版本
    image: cloudreve/cloudreve:4.16.0
    ports:
      - "127.0.0.1:5212:5212"
    volumes:
      - cloudreve_data:/cloudreve/uploads
      - cloudreve_config:/cloudreve/config
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  appdata:
  mysqldata:
  redisdata:
  cloudreve_data:
  cloudreve_config:
